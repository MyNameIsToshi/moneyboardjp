name: Tests

# dev への push と main への PR で単体テストを自動実行する。
# main への PR では、このチェックを必須にする（Settings → Branches の保護ルール）ことで
# テストが緑でないとマージできないマージゲートになる。
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

# PR コメント投稿に必要（main への PR 時にカバレッジを固定コメントで出す）
permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit tests (MoneyBoardShared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: |
          dotnet restore MoneyBoardShared.Tests/MoneyBoardShared.Tests.csproj
          dotnet restore MoneyBoardApi.Tests/MoneyBoardApi.Tests.csproj

      - name: Test - MoneyBoardShared
        run: >
          dotnet test MoneyBoardShared.Tests/MoneyBoardShared.Tests.csproj
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --logger "console;verbosity=normal"

      - name: Test - MoneyBoardApi
        run: >
          dotnet test MoneyBoardApi.Tests/MoneyBoardApi.Tests.csproj
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --logger "console;verbosity=normal"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            MoneyBoardShared.Tests/TestResults/**/coverage.cobertura.xml
            MoneyBoardApi.Tests/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

      # cobertura XML 2本（Shared/API）をマージして markdown サマリを生成
      - name: Coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both          # コンソール＋ code-coverage-results.md
          hide_complexity: true

      # PR が無い実行（dev push 等）でも Actions の実行ページで数値が見えるように
      - name: Write coverage to job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      # main への PR のときだけ、固定コメントを上書き更新で投稿する
      - name: Post coverage to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          recreate: true
          path: code-coverage-results.md
